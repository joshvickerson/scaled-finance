{% extends "layouts/base.html" %}

{% block customMeta %}
<style>
	:root {
	--page-bg-image: url("{{ pageBackgroundImage }}");
	--page-bg-image-mobile: url("{{ pageBackgroundImageMobile }}");
	}
</style>
{% endblock %}

{% block content %}

{%- if hero is defined -%}
<div class="page-hero">
	<div class="wrapper">
		<h1>{{ hero.header }}</h1>
		<p>{{ hero.subheader }}</p>
	</div>
</div>
{%- endif -%}
<div class="page-wrapper">
	{{ content | safe }}
</div>

{% endblock %}
