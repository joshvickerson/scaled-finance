<section class="feed-index__content" id="post-list">
	<div class="wrapper">
		<ol class="post-list">
			{% for post in postListItems %}
			<li class="post-list__item">
				{% if post.data.coverPhoto %}
					<img src="{{post.data.coverPhoto.file}}" alt="{{post.data.coverPhoto.alt}}" />
				{% endif %}
				<h2><a href="{{ post.url }}" class="post-list__link">{{ post.data.title }}</a></h2>
				<p class="post-list__author">By {{ post.data.authors[0].name }}</p>
				{% if post.data.summary is defined %}
				<p class="post-list__description">{{ post.data.summary }}</p>
				{% endif %}
				<time class="post-list__publish-date" datetime="{{ post.data.date | w3DateFilter }}">{{ post.data.date | readableDate | safe }}</time>
			</li>
			{% endfor %}
		</ol>
	</div>
</section>
